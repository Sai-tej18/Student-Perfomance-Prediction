<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4">

        <div class="d-flex justify-content-between mb-3">
            <h3>Prediction Records</h3>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>

        <a href="{{ url_for('download') }}">
            <button style="padding:8px 16px; background-color:#28a745; color:white; border:none; border-radius:5px; margin-bottom:15px;">
                Download Records
            </button>
        </a>

        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>Study Hours</th>
                    <th>Attendance</th>
                    <th>Previous Score</th>
                    <th>Predicted Final Score</th>
                </tr>
            </thead>
            <tbody>
                {% for row in records %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>
</body>
</html>
